name: bigbrain
label: BigBrain
description: The NiSpace "BigBrain" dataset is adopted from the BigBrainWarp toolbox (https://bigbrainwarp.readthedocs.io)
  by Paquola et al. The maps are fetched directly from the BigBrainWarp Sciebo folder (space="fsaverageOriginal") or downloaded
  from the NiSpace-data GitHub repo (space="fsLR" or "fsaverage"; recommended). The data is subject to a CC BY-NC-SA 4.0 license.
  Please cite the appropriate original publication for each map when used (see map info table).
cortex_only: true
citations:
- ref: Amunts et al., 2013
  doi: 10.1126/science.1235381
- ref: Paquola et al., 2021
  doi: 10.7554/eLife.70119
map_info:
  cite_column: doi
  display_columns:
  - feature
  - doi
  - license
collections:
  All:
    description: All BigBrain histological maps (cortical layers and differentiation gradients).
  CorticalLayers:
    description: Cortical layer density maps for layers 1–6 (Wagstyl et al., 2020).
  DifferentiationGradients:
    description: Histological, microstructural, and functional cortical differentiation gradients (Paquola et al., 2021).
tabs: auto
