name: magicc
label: MAGICC
description: The NiSpace "MAGICC" dataset is based on Allen Human Brain Atlas (AHBA) gene expression data published in Hawrylycz
  et al., 2012. The dataset consists of mRNA expression data from postmortem brain tissue of six donors, mapped onto continuous
  fsLR space as described in Wagstyl et al., 2024, and parcellated with integrated parcellation. Only genes that showed a
  high reproducibility (>= 0.5, see paper) were retained. Please also cite publications associated with gene set collections
  as appropriate.
cortex_only: true
citations:
- ref: Hawrylycz et al., 2012
  doi: 10.1038/nature11405
- ref: Wagstyl et al., 2024
  doi: 10.7554/eLife.86933.1
collections:
