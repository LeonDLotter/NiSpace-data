name: pet
label: PET
description: The NiSpace "PET" dataset is based on openly available nuclear imaging maps largely accessed via neuromaps (https://neuromaps-main.readthedocs.io/).
  If requested in the varying original spaces and resolutions (termed "MNIOriginal", "fsaverageOriginal", or "fsLROriginal"), the
  maps are downloaded directly from the source and cached locally. If, as is highly recommended, the maps are requested in
  a defined space ("MNI152NLin2009cAsym", "MNI152NLin6Asym", "fsaverage", or "fsLR"), they are downloaded from the NiSpace-data
  GitHub repo. The NiSpace-hosted MNI maps were directly registered to 2mm MNI152NLin6Asym space, and transformed to 2mm MNI152NLin2009cAsym
  with a pre-estimated MNI-to-MNI transformation using SynthMorph v4. The resulting maps were masked with a liberal grey matter
  mask generated from the Harvard-Oxford atlas and scaled from 1e-6 to 1. The accompanying metadata table contains detailed
  information about tracers, source samples, original publications and data sources, as well as the publication licenses.
  Every map should be cited when used. The responsibility for this lies with the user!
cortex_only: false
citations:
- ref: Markello et al., 2022
  doi: 10.1038/s41592-022-01625-w
- ref: Hansen et al., 2022
  doi: 10.1038/s41593-022-01186-3
- ref: Dukart et al., 2021
  doi: 10.1002/hbm.25244
- ref: Hoffmann et al., 2024
  doi: 10.1162/imag_a_00197
map_info:
  cite_column: doi
  display_columns:
  - target
  - tracer
  - metric
  - sample_size
  - license
  note_column: note
collections:
  All:
    description: All PET receptor/transporter density maps.
  AllTargetSets:
    description: All maps grouped by molecular target (may include multiple tracers per target).
  UniqueTracers:
    description: One representative map per molecular target, selected for quality/sample size.
  UniqueTracerSets:
    description: UniqueTracers maps grouped by molecular target.
tabs: auto
