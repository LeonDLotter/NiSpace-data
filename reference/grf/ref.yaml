name: grf
label: GRF
description: The NiSpace "GRF" dataset consists of many thousands of "Gaussian Random Field Maps" (GRFs) generated with different
  levels of spatial smoothness. The parameter "alpha" controls the smoothness of the field and therefore the spatial autocorrelation
  of the resulting brain maps. The maps are mirrored across hemispheres exactly at MNI coordinate (0,0,0). There are 1,000
  maps for each alpha level. The code was adopted from Markello et al., 2021 and Burt et al., 2020.
default_collection: ByAlpha
cortex_only: false
citations:
- ref: Markello et al., 2021
  doi: 10.1016/j.neuroimage.2021.118052
- ref: Burt et al., 2020
  doi: 10.1016/j.neuroimage.2020.117038
collections:
  All:
    description: 4000 Gaussian random fields (1000 per smoothness level alpha 0, 1, 2, 3).
  Alpha0:
    description: 1000 spatially unstructured (white noise) GRFs (alpha=0).
  ByAlpha:
    description: All 4000 GRFs grouped by smoothness parameter (alpha).
tabs: auto
