name: mrna
label: mRNA
description: The NiSpace "mRNA" dataset contains whole-brain gene expression maps for > 10,000 genes based on parcel-wise mapping.
  The dataset consists of Allen Brain Atlas mRNA expression data from postmortem brain tissue of six donors (Hawrylycz et al., 2012), 
  mapped onto MNI or fsaverage parcels using the abagen toolbox (Markello et al., 2021; abagen.get_expression_data(...,
  lr_mirror="bidirectional", norm_matched=False)). Gene stability was assessed using a voxel-level atlas at 8mm isotropic resolution;
  genes were retained if their mean donor-to-donor Spearman rank correlation exceeded 0.2. 
  Please cite the source publications, as well as publications associated with gene set collections as appropriate.
default_collection: CellTypesPsychEncodeTPM
cortex_only: false
citations:
- ref: Hawrylycz et al., 2012
  doi: 10.1038/nature11405
- ref: Markello et al., 2021
  doi: 10.7554/eLife.72129
