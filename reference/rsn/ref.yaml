name: rsn
label: RSN
description: The NiSpace "RSN" dataset is based on resting-state network probability maps generated by Dworetsky et al., 2021.
  The maps were obtained from the associated GitHub repository and can be retrieved in their original form with space="MNIOriginal".
  These maps were downloaded in MNI152NLin6Asym space and transformed to MNI152NLin2009cAsym with a pre-estimated MNI-to-MNI
  transformation, divided by 100, masked with a liberal grey matter mask, and transformed to fsLR and fsaverage. Please cite
  the original publication when using these maps.
cortex_only: true
citations:
- ref: Dworetsky et al., 2021
  doi: 10.1016/j.neuroimage.2021.118164
collections:
  All:
    description: All 17 resting-state network maps (Dworetsky et al., 2021).
tabs: auto
