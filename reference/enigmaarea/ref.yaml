name: enigmaarea
label: ENIGMAarea
description: The NiSpace "ENIGMAarea" dataset is based on ENIGMA (Enhancing NeuroImaging Genetics through Meta-Analysis) working
  group summary statistics as provided via the ENIGMA Toolbox v2.0.3 (https://github.com/MICA-MNI/ENIGMA). It contains Cohen's
  d effect sizes (d_icv, largely ICV-corrected) for case-vs-control differences in cortical surface area and subcortical volume
  across several neurological and psychiatric disorders. Cortical values are provided in the Desikan parcellation, subcortical
  values in the Aseg parcellation. For some disorders, effect size maps are split by subtype and/or age group. Use collection
  "Adult" for a reduced collection of only adult data. For each disorder, please cite the appropriate ENIGMA working group
  publication (see map info table).
cortex_only: false
citations:
- ref: Larivière et al., 2021
  doi: 10.1038/s41596-021-00579-z
map_info:
  cite_column: doi
  display_columns:
  - disorder
  - age_group
  - n_cases
  - doi
collections:
  All:
    description: All case-control effect size maps across disorders and age groups.
  Adult:
    description: Adult-only maps (pediatric and adolescent age groups excluded).
tabs:
- DesikanKilliany
- Aseg
