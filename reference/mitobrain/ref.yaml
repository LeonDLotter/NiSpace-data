name: mitobrain
label: MitoBrain
description: The NiSpace "MitoBrain" datasets contains mitochondrial phenotypes reconstructed from histological data.
  The source data is provided by MitoBrainMap (http://humanmitobrainmap.bcblab.com; Mosharov et al., 2025, Nature).
  Maps were generated by profiling OXPHOS enzyme activities and mitochondria density in a whole human hemisphere at 3mm 
  voxel-like resolution and reconstruction into MNIs space. Original maps are retrieved from NeuroVault 
  (https://identifiers.org/neurovault.collection:16418; space MNIOriginal), masked, resampled to 2mm 
  MNI152NLin6Asym space, and transformed to MNI152NLin2009cAsym, fsLR, and fsaverage surface spaces.
cortex_only: false
citations:
- ref: Mosharov et al., 2025
  doi: 10.1038/s41586-025-08740-6
map_info:
  cite_column: doi
  display_columns:
