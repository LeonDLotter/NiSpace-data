name: cortexfeatures
label: CortexFeatures
description: The NiSpace "CortexFeatures" dataset consists of different features of cortical topology available via neuromaps
  (https://neuromaps-main.readthedocs.io/). Many of these maps were used in Shafiei et al., 2023. The maps are fetched directly
  from neuromaps (space="fsLROriginal" or "fsaverageOriginal") or downloaded from the NiSpace-data GitHub repo (space="fsLR"
  or "fsaverage"; recommended). Please cite the original publication for each map when used.
cortex_only: true
citations:
- ref: Markello et al., 2022
  doi: 10.1038/s41592-022-01625-w
- ref: Shafiei et al., 2023
  doi: 10.1038/s41467-023-41689-6
map_info:
  cite_column: doi
  display_columns:
  - feature
  - doi
  - license
collections:
  All:
    description: All cortical feature maps.
  MEG:
    description: MEG power spectra and timescale maps (Shafiei et al., 2022).
  Metabolism:
    description: 'Different features of cortical metabolism (Vaishnavi et al., 2010).'
  CortexOrganisation:
    description: 'Different features of cortical organisation (various sources).'
tabs: auto
