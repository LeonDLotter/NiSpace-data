name: enigmathick
label: ENIGMAthick
description: The NiSpace "ENIGMAthick" dataset is based on ENIGMA analyses of brain structure across several neuro-psychiatric disorders. 
  The original data is provided via the ENIGMA Toolbox v2.0.3 (https://github.com/MICA-MNI/ENIGMA). It contains Cohen's
  d effect sizes (d_icv, largely ICV-corrected) for case-vs-control differences in cortical thickness and subcortical volume. 
  Cortical values are provided in the Desikan parcellation, subcortical values in the Aseg parcellation. For some disorders, 
  effect size maps are split by subtype and/or age group. Use collection "Main" for a reduced collection of the main effect size maps. 
  For each disorder, please cite the appropriate ENIGMA working group publication (see map info table).
default_collection: Main
cortex_only: false
citations:
- ref: Larivière et al., 2021
  doi: 10.1038/s41596-021-00579-z
map_info:
  cite_column: doi
  display_columns:
  - disorder
  - age_group
  - n_cases
  - doi
collections:
  All:
    description: All case-control effect size maps across disorders and age groups.
  Main:
    description: Main effect size maps.
tabs:
- DesikanKilliany
- Aseg
